linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  govet:
    enable-all: true
    disable:
      - fieldalignment
  staticcheck:
    checks:
      - all

run:
  go: '1.24'
  timeout: 10m
  modules-download-mode: mod
  skip-dirs:
    - cli_agents
    - MCP
    - MCP-Servers
    - vendor

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: .*_test\.go$
      linters:
        - errcheck
    - path: cli_agents/
      linters:
        - errcheck
        - staticcheck
        - unused
        - gosimple
        - typecheck
        - ineffassign
    - path: MCP/submodules/
      linters:
        - errcheck
        - staticcheck
        - unused
        - gosimple
        - typecheck
        - ineffassign
    - path: MCP-Servers/
      linters:
        - errcheck
        - staticcheck
        - unused
        - gosimple
        - typecheck
        - ineffassign
    - path: vendor/
      linters:
        - errcheck
        - staticcheck
        - unused
        - gosimple
        - typecheck
        - ineffassign

severity:
  default: warning
