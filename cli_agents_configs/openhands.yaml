# HelixAgent Exported Configuration: OpenHands
# OpenHands: AI-powered software development

version: "1.0"
agent_type: "openhands"
name: "OpenHands"
description: "AI software development with sandboxed execution"

helixagent:
  endpoint: "http://localhost:7061"
  api_key: "${HELIXAGENT_API_KEY:-default}"
  
  # Model configuration
  model:
    provider: "ensemble"
    model: "helixagent/ensemble"
    temperature: 0.6
    max_tokens: 8192
  
  # Container orchestration
  containers:
    enabled: true
    lazy_startup: true
    runtime: "docker"  # docker, podman
    profiles:
      - local-gpu
      - hybrid
      - opensource
  
  # NVIDIA RAG integration
  nvidia_rag:
    enabled: true
    embedding_model: "nemotron-embed"
    reranker_model: "nemotron-rerank"
    super_model: "nemotron-super-49b"
    vector_db: "milvus"
  
  # MCP tools
  mcp:
    enabled: true
    tools:
      - bash
      - read_file
      - write_file
      - browser
      - execute_ipython

# OpenHands specific settings
openhands:
  # Sandbox configuration
  sandbox:
    enabled: true
    type: "docker"
    image: "openhands-runtime"
    isolation: true
    resource_limits:
      cpu: 2
      memory: "4g"
    
  # Workspace
  workspace:
    mount_path: "/workspace"
    persist_changes: true
    
  # Agent configuration
  agent:
    name: "CodeActAgent"
    max_iterations: 100
    timeout_seconds: 300
    
  # LLM settings
  llm:
    model: "helixagent/ensemble"
    api_base: "http://localhost:7061/v1"
    retry_attempts: 3
    
  # Security
  security:
    confirm_destructive_commands: true
    allowed_commands: ["ls", "cat", "pwd", "go", "git", "make"]
    blocked_commands: ["rm -rf /", "dd", "mkfs"]

# Logging
logging:
  level: "info"
  format: "structured"
