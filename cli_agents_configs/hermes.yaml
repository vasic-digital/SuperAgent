# HelixAgent Exported Configuration: Hermes Agent
# Hermes Agent: Self-improving AI agent with built-in learning loop
# Source: https://github.com/NousResearch/hermes-agent
# Built by: Nous Research

version: "1.0"
agent_type: "hermes"
name: "Hermes Agent"
description: "Self-improving AI agent with learning loop, multi-platform messaging, and skills system"

helixagent:
  endpoint: "http://localhost:7061"
  api_key: "${HELIXAGENT_API_KEY:-default}"
  
  # Primary model configuration - Hermes supports multiple providers
  primary_model:
    provider: "ensemble"
    model: "helixagent/ensemble"
    temperature: 0.7
    max_tokens: 4096
  
  # Alternative model configurations for different tasks
  models:
    default:
      provider: "ensemble"
      model: "helixagent/ensemble"
      temperature: 0.7
    fast:
      provider: "ensemble"
      model: "helixagent/ensemble-fast"
      temperature: 0.5
    creative:
      provider: "ensemble"
      model: "helixagent/ensemble"
      temperature: 0.9
  
  # Fallback configuration
  fallback:
    enabled: true
    providers: ["claude", "deepseek", "gemini", "openrouter"]
    strategy: "sequential"
  
  # MCP integration - Hermes has native MCP support
  mcp:
    enabled: true
    server_url: "http://localhost:7061/v1/mcp"
    tools:
      # File system tools
      - read_file
      - write_file
      - edit_file
      - list_directory
      - search_files
      # Shell tools
      - bash
      - execute_command
      # Git tools
      - git_status
      - git_diff
      - git_commit
      - git_push
      # Search tools
      - grep_search
      - semantic_search
      # Memory tools
      - remember
      - recall
      - forget
      # Skills tools
      - create_skill
      - list_skills
      - execute_skill
    auto_approve_tools: 
      - read_file
      - list_directory
      - git_status
      - recall
      - list_skills
  
  # Debate orchestrator - for complex reasoning
  debate:
    enabled: true
    default_topology: "mesh"
    min_agents: 2
    max_agents: 5
    auto_debate_threshold: 0.7
    timeout_seconds: 120
  
  # Memory integration
  memory:
    enabled: true
    provider: "helixmemory"
    session_persistence: true
    cross_session_recall: true

# Hermes Agent specific settings
hermes:
  # Terminal User Interface
  terminal_ui:
    enabled: true
    multiline_editing: true
    autocomplete: true
    syntax_highlighting: true
    color_output: true
    theme: "dark"
    spinner: true
    progress_bars: true
  
  # Skills System - Core Hermes feature
  skills:
    enabled: true
    auto_create: true
    auto_improve: true
    skills_directory: "${HOME}/.hermes/skills"
    import_from_openclaw: true
    import_from_agentskills: true
    
  # Learning Loop - Self-improvement system
  learning:
    enabled: true
    create_from_experience: true
    improve_during_use: true
    periodic_nudges: true
    nudge_interval_hours: 24
    
  # Memory System
  memory:
    persistent: true
    session_search: true
    fts5_enabled: true
    user_modeling: true
    dialectic_modeling: "honcho"
    cross_session_recall: true
    
  # Messaging Gateway - Multi-platform support
  messaging:
    enabled: false  # Set to true to enable messaging platforms
    platforms:
      telegram:
        enabled: false
        bot_token: "${TELEGRAM_BOT_TOKEN:-}"
      discord:
        enabled: false
        bot_token: "${DISCORD_BOT_TOKEN:-}"
      slack:
        enabled: false
        bot_token: "${SLACK_BOT_TOKEN:-}"
      whatsapp:
        enabled: false
      signal:
        enabled: false
      email:
        enabled: false
    
  # Scheduled Automations - Cron-like scheduling
  scheduler:
    enabled: true
    cron_jobs: []
    # Example:
    # - name: "daily_report"
    #   schedule: "0 9 * * *"
    #   prompt: "Generate daily summary"
    #   platform: "telegram"
    
  # Terminal Backends - Deployment options
  terminal_backends:
    local:
      enabled: true
      default: true
    docker:
      enabled: false
      image: "nousresearch/hermes-agent:latest"
    ssh:
      enabled: false
      host: ""
      user: ""
    daytona:
      enabled: false
      serverless: true
    singularity:
      enabled: false
    modal:
      enabled: false
      serverless: true
      hibernation: true
      
  # Subagents - Parallel workstreams
  subagents:
    enabled: true
    max_concurrent: 5
    isolation: "container"
    
  # Voice and Audio
  voice:
    enabled: false
    transcription: true
    tts_provider: "elevenlabs"
    elevenlabs_api_key: "${ELEVENLABS_API_KEY:-}"
    
  # Security
  security:
    command_approval: true
    require_approval_for:
      - bash
      - execute_command
      - git_push
      - write_file
    allowed_commands: []
    blocked_commands: []
    container_isolation: false
    dm_pairing: true
    
  # Context and Project Files
  context:
    context_files: true
    project_context: "CONTEXT.md"
    workspace_instructions: "AGENTS.md"
    
  # Research and RL Features
  research:
    trajectory_generation: true
    atropos_rl: false
    trajectory_compression: true
    batch_processing: false

# Session Management
session:
  persistent: true
  save_history: true
  max_history: 1000
  compression_threshold: 0.8
  
# Logging
logging:
  level: "info"
  format: "json"
  output: "stdout"
  file: "${HOME}/.hermes/logs/hermes.log"
  max_size_mb: 100
  max_backups: 5
  
# Installation and Setup
installation:
  method: "curl"
  url: "https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh"
  python_version: "3.11"
  package_manager: "uv"
  
  # Post-installation setup
  setup:
    - "hermes setup"  # Run setup wizard
    - "hermes model"  # Configure model
    - "hermes tools"  # Configure tools
    
# Migration from OpenClaw
migration:
  from_openclaw:
    enabled: true
    command: "hermes claw migrate"
    dry_run: "hermes claw migrate --dry-run"
    imports:
      - SOUL.md
      - memories
      - skills
      - api_keys
      - messaging_settings
      - command_allowlist
      
# Integration Notes
notes: |
  Hermes Agent is a comprehensive AI agent system with unique features:
  
  1. Self-Improving Learning Loop:
     - Creates skills from experience
     - Improves skills during use
     - Periodically nudges itself to persist knowledge
  
  2. Multi-Platform Messaging:
     - Telegram, Discord, Slack, WhatsApp, Signal
     - Cross-platform conversation continuity
     - Voice memo transcription
  
  3. Terminal User Interface:
     - Multiline editing
     - Slash-command autocomplete
     - Conversation history
     - Interrupt-and-redirect
     - Streaming tool output
  
  4. Skills System:
     - Procedural memory
     - Compatible with agentskills.io standard
     - Skills Hub integration
  
  5. Scheduled Automations:
     - Built-in cron scheduler
     - Natural language task definitions
     - Delivery to any platform
  
  6. Multiple Terminal Backends:
     - Local, Docker, SSH
     - Daytona and Modal serverless
     - Cost-effective hibernation
  
  7. Research Features:
     - Batch trajectory generation
     - Atropos RL environments
     - Trajectory compression
  
  To use with HelixAgent:
  1. Install Hermes: curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash
  2. Configure: hermes setup
  3. Set model to use HelixAgent endpoint
  4. Start: hermes
  
  Documentation: https://hermes-agent.nousresearch.com/docs
