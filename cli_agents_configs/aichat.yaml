# HelixAgent Exported Configuration: AIChat
# AIChat: All-in-one LLM CLI tool with 20+ provider support

version: "1.0"
agent_type: "aichat"
name: "AIChat"
description: "All-in-one LLM CLI tool featuring Shell Assistant, REPL, RAG, AI Tools & Agents"

helixagent:
  endpoint: "http://localhost:7061"
  api_key: "${HELIXAGENT_API_KEY:-default}"
  
  # Model configuration - use HelixAgent ensemble
  model:
    provider: "ensemble"
    model: "helixagent/ensemble"
    temperature: 0.7
    max_tokens: 8192
  
  # HelixAgent features to use
  features:
    ensemble: true
    debate: true
    mcp: true
    streaming: true
  
  # MCP integration
  mcp:
    enabled: true
    server_url: "http://localhost:7061/v1/mcp"
    tools:
      - read_file
      - write_file
      - edit_file
      - bash
      - git
      - search
      - view
    
  # Debate orchestrator
  debate:
    enabled: true
    default_topology: "mesh"
    auto_debate: true

# AIChat specific configuration
aichat:
  # Multi-provider support (22+ providers)
  # These are proxied through HelixAgent
  clients:
    # Primary: HelixAgent ensemble
    - type: openai-compatible
      name: helixagent
      api_base: http://localhost:7061/v1
      api_key: ${HELIXAGENT_API_KEY}
      models:
        - name: helixagent/ensemble
          max_input_tokens: 128000
          max_output_tokens: 8192
          
    # Direct providers (fallback when HelixAgent unavailable)
    - type: claude
      api_key: ${CLAUDE_API_KEY}
      models:
        - claude:claude-3-7-sonnet-20250219
        - claude:claude-3-5-sonnet-20241022
        
    - type: openai
      api_key: ${OPENAI_API_KEY}
      models:
        - openai:gpt-4o
        - openai:gpt-4.1
        
    - type: gemini
      api_key: ${GEMINI_API_KEY}
      models:
        - gemini:gemini-2.0-flash-thinking-exp
        - gemini:gemini-2.5-pro-exp-03-25
        
    - type: deepseek
      api_key: ${DEEPSEEK_API_KEY}
      models:
        - deepseek:deepseek-chat-v3
        
    - type: ollama
      api_base: http://localhost:11434
      models:
        - ollama:llama3.3
        - ollama:codellama

  # Default model selection
  default_model: helixagent/ensemble
  
  # REPL configuration
  repl:
    keybindings: emacs  # or vim
    history_size: 10000
    multiline_input: true
    tab_completion: true
    
  # Session management
  session:
    enabled: true
    save_history: true
    auto_save: true
    compress_threshold: 20  # Compress after N messages
    
  # RAG configuration
  rag:
    enabled: true
    # Use HelixAgent NVIDIA RAG when available
    use_helixagent_rag: true
    helixagent_rag_endpoint: http://localhost:7061/v1/rag
    # Local RAG fallback
    top_k: 5
    reranker_model: cohere:rerank-english-v3.0
    
  # Function calling
  function_calling:
    enabled: true
    # Use HelixAgent MCP tools
    use_helixagent_mcp: true
    # LLM-Functions integration
    llm_functions_dir: ${HELIXAGENT_DIR}/cli_agents/aichat-llm-functions
    
  # AI Agents
  agents:
    enabled: true
    # Import HelixAgent agents
    import_helixagent_agents: true
    # Local agents from llm-functions
    local_agents_dir: ${HELIXAGENT_DIR}/cli_agents/aichat-llm-functions/agents
    
  # Shell assistant
  shell:
    enabled: true
    os_aware: true
    auto_execute: false  # Require confirmation
    
  # Serve mode (for HelixAgent integration)
  serve:
    enabled: true
    bind_address: 127.0.0.1
    port: 8001  # Different from HelixAgent's 7061
    # Expose as HelixAgent provider
    register_with_helixagent: true
    
  # Roles
  roles:
    - name: developer
      prompt: |
        You are an expert software developer.
        You write clean, efficient, and well-documented code.
        You follow best practices and design patterns.
      model: helixagent/ensemble
      
    - name: reviewer
      prompt: |
        You are a code reviewer. Focus on:
        - Code quality and readability
        - Security best practices
        - Performance optimizations
        - Architecture improvements
      model: helixagent/ensemble
      temperature: 0.3
      
    - name: architect
      prompt: |
        You are a software architect. Provide high-level design guidance,
        system architecture recommendations, and technical strategy.
      model: claude:claude-3-opus

  # Macros
  macros:
    enabled: true
    
  # Editor
  editor: ${EDITOR:-vim}
  
  # Theme
  theme: dark  # or light, auto
  
  # Light/Dark mode
  light_theme: monokai
  dark_theme: dracula
  
  # User agent
  user_agent: "HelixAgent-AIChat/1.0"

# Document loaders
 document_loaders:
  enabled: true
  pdf: true
  docx: true
  html: true
  markdown: true
  code: true

# Output settings
output:
  format: markdown
  syntax_highlighting: true
  wrap: auto
  
# Debug
debug: false
verbose: false
