#
# HelixAgent Exported Configuration: Git Mcp
# Category: MCP
# Tier: 2

version: "1.0"
agent_type: "git-mcp"
name: "Git Mcp"
description: "HelixAgent integration configuration for Git Mcp"

helixagent:
  endpoint: "http://localhost:7061"
  api_key: "${HELIXAGENT_API_KEY:-default}"
  primary_model:
    provider: "ensemble"
    model: "helixagent/ensemble"
    temperature: 0.7
    max_tokens: 4096
  fallback:
    enabled: true
    providers: ["claude", "deepseek", "gemini", "openrouter"]
    strategy: "sequential"
  mcp:
    enabled: true
    server_url: "http://localhost:7061/v1/mcp"
    tools:
      - read_file
      - write_file
      - edit_file
      - bash
      - search
      - git
    auto_approve_tools:
      - read_file
      - search
  debate:
    enabled: true
    default_topology: "mesh"
    min_agents: 2
    max_agents: 5
    auto_debate_threshold: 0.7
  # Standard features for Tier 2 agents
  semantic_search:
    enabled: true
  context_templates:
    enabled: true

logging:
  level: "info"
  format: "json"
  output: "stdout"
