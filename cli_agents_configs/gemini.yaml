#
# HelixAgent Exported Configuration: Gemini CLI
# Gemini: Google's multi-modal AI assistant

version: "1.0"
agent_type: "gemini"
name: "Gemini CLI"
description: "Multi-modal AI with vision and document understanding"

helixagent:
  endpoint: "http://localhost:7061"
  api_key: "${HELIXAGENT_API_KEY:-default}"
  
  # Model configuration
  models:
    default:
      provider: "ensemble"
      model: "helixagent/ensemble"
      temperature: 0.7
    vision:
      provider: "ensemble"
      model: "helixagent/ensemble-vision"
      temperature: 0.4
    document:
      provider: "ensemble"
      model: "helixagent/ensemble"
      temperature: 0.5
  
  # Multi-modal features
  multimodal:
    enabled: true
    image_support: true
    document_support: true
    audio_support: false

# Gemini specific settings
gemini:
  # Multi-modal settings
  multimodal:
    enabled: true
    max_image_size: 20971520  # 20MB
    supported_formats: ["png", "jpg", "jpeg", "gif", "webp", "pdf"]
  
  # Document processing
  documents:
    enabled: true
    max_pages: 1000
    extract_text: true
    analyze_layout: true
  
  # Grounding
  grounding:
    enabled: true
    search_integration: true
    citation_required: false
  
  # Safety
  safety:
    enabled: true
    threshold: "block_none"
  
  # Code execution
  code_execution:
    enabled: true
    sandbox: true

# Logging
logging:
  level: "info"
