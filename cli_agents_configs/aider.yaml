#
# HelixAgent Exported Configuration: Aider
# Aider: AI pair programming with git integration

version: "1.0"
agent_type: "aider"
name: "Aider"
description: "AI pair programming in your terminal"

helixagent:
  endpoint: "http://localhost:7061"
  api_key: "${HELIXAGENT_API_KEY:-default}"
  
  # Model configuration
  models:
    default:
      provider: "ensemble"
      model: "helixagent/ensemble"
      temperature: 0.7
    architect:
      provider: "ensemble"
      model: "helixagent/ensemble"
      temperature: 0.3
    editor:
      provider: "ensemble"
      model: "helixagent/ensemble-fast"
      temperature: 0.5
  
  # Features
  features:
    repo_map: true
    architect_mode: true
    test_execution: true
    linting: true
  
  # MCP tools
  mcp:
    enabled: true
    tools:
      - read_file
      - write_file
      - edit_file
      - bash
      - search

# Aider specific settings
aider:
  # Git integration
  git:
    auto_commit: true
    commit_prompt: true
    attribute_commits: true
    commit_message_format: "conventional"
  
  # Repository map
  repo_map:
    enabled: true
    refresh_interval: 300
    max_tokens: 8192
  
  # Architect mode
  architect_mode:
    enabled: true
    planning_temperature: 0.3
    coding_temperature: 0.5
  
  # File management
  files:
    auto_add: false
    max_file_size: 100000  # bytes
    encoding: "utf-8"
  
  # Testing
  testing:
    auto_test: false
    test_command: "go test ./..."
    lint_command: "golangci-lint run"
  
  # Edit format
  edit_format: "diff"
  fuzzy_match: true

# Logging
logging:
  level: "info"
  format: "json"
