#
# HelixAgent Exported Configuration: Codex
# Codex: OpenAI's coding agent with agent mode

version: "1.0"
agent_type: "codex"
name: "Codex"
description: "OpenAI Codex CLI with agent mode"

helixagent:
  endpoint: "http://localhost:7061"
  api_key: "${HELIXAGENT_API_KEY:-default}"
  
  # Model configuration
  model:
    provider: "ensemble"
    model: "helixagent/ensemble"
    temperature: 0.7
    max_tokens: 4096
  
  # Agent mode features
  agent_mode:
    enabled: true
    max_tool_calls: 100
    auto_confirm_tools: ["read_file", "view"]
    require_confirmation: ["write_file", "bash", "edit_file"]
  
  # MCP integration
  mcp:
    enabled: true
    tools:
      - read_file
      - write_file
      - edit_file
      - bash
      - git
      - search

# Codex specific settings
codex:
  # Agent mode
  agent_mode:
    enabled: true
    planning: true
    
  # Full autonomy
  full_autonomy:
    enabled: false
    require_approval: true
    
  # Approval settings
  approval:
    mode: "suggest"  # suggest, auto_edit, full_auto
    
  # Context
  context:
    max_files: 10
    auto_add_related: true
    
  # Git
  git:
    enabled: true
    commit_style: "conventional"

# Logging
logging:
  level: "info"
