# HelixAgent Exported Configuration: Claude Code
# Claude Code: Terminal-native AI coding assistant

version: "1.0"
agent_type: "claude_code"
name: "Claude Code"
description: "Agentic coding tool with terminal integration and MCP support"

helixagent:
  endpoint: "http://localhost:7061"
  api_key: "${HELIXAGENT_API_KEY:-default}"
  
  # Primary model configuration
  primary_model:
    provider: "ensemble"
    model: "helixagent/ensemble"
    temperature: 0.7
    max_tokens: 4096
  
  # Fallback configuration
  fallback:
    enabled: true
    providers: ["claude", "deepseek", "gemini"]
  
  # MCP integration
  mcp:
    enabled: true
    server_url: "http://localhost:7061/v1/mcp"
    tools:
      - read_file
      - write_file
      - edit_file
      - bash
      - git
      - search
      - view
    auto_approve_tools: ["read_file", "view"]
  
  # Debate orchestrator
  debate:
    enabled: true
    default_topology: "mesh"
    min_agents: 2
    max_agents: 5
    auto_debate_threshold: 0.7

# Claude Code specific settings
claude_code:
  editor_mode: "default"  # vim, emacs, nano, default
  theme: "dark"
  auto_commit: false
  git_enabled: true
  timeout_minutes: 60
  
  # Terminal UI
  terminal_ui:
    spinner: true
    progress_bars: true
    syntax_highlighting: true
    color_output: true
  
  # Session management
  session:
    persistent: true
    save_history: true
    max_history: 1000
  
  # Tool permissions
  permissions:
    allow_bash: true
    allow_file_write: true
    allow_git: true
    require_approval_for: ["bash", "write_file"]

# Logging
logging:
  level: "info"
  format: "json"
  output: "stdout"
