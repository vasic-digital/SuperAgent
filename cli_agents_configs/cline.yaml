#
# HelixAgent Exported Configuration: Cline
# Cline: IDE-native AI assistant for VS Code

version: "1.0"
agent_type: "cline"
name: "Cline"
description: "IDE-native AI assistant with auto-approval and checkpoint navigation"

helixagent:
  endpoint: "http://localhost:7061"
  api_key: "${HELIXAGENT_API_KEY:-default}"
  
  # Model configuration
  model:
    provider: "ensemble"
    model: "helixagent/ensemble"
    temperature: 0.7
    max_tokens: 8192
  
  # MCP tools
  mcp:
    enabled: true
    tools:
      - read_file
      - write_file
      - edit_file
      - bash
      - git
      - search
    auto_approve: ["read_file", "search"]
  
  # Auto-approval
  auto_approve:
    enabled: true
    tools: ["read_file", "view", "search"]
    require_confirmation: ["write_file", "bash", "edit_file"]

# Cline specific settings
cline:
  # IDE integration
  ide:
    type: "vscode"
    context_awareness: true
    file_watching: true
  
  # Auto-approval settings
  approval:
    mode: "suggest"  # suggest, auto_edit, full_auto
    read_files: true
    edit_files: false
    execute_commands: false
    use_browser: false
  
  # Checkpoints
  checkpoints:
    enabled: true
    auto_save: true
    max_checkpoints: 50
  
  # Context management
  context:
    max_files: 20
    auto_add_open_files: true
    follow_imports: true
  
  # Browser
  browser:
    enabled: true
    headless: true
  
  # Terminal
  terminal:
    integration: true
    command_timeout: 30000

# Logging
logging:
  level: "info"
  output: "vscode-output"
