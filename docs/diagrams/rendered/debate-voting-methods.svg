ww.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>Pairwise comparison matrix<br />Winner beats all others head-to-head<br />Falls back to Borda if cycle detected</p></span></div></foreignObject></g></g></g></g><g class="root" transform="translate(335, 310)"><g class="clusters"><g class="cluster" id="Borda" data-look="classic"><rect style="fill:#e0f2f1 !important;stroke:#00695c !important" x="8" y="8" width="330" height="225"/><g class="cluster-label" transform="translate(128, 8)"><foreignObject width="90" height="24"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="nodeLabel"><p>Borda Count</p></span></div></foreignObject></g></g></g><g class="edgePaths"/><g class="edgeLabels"/><g class="nodes"><g class="node default" id="flowchart-B_Desc-4" transform="translate(173, 120.5)"><rect class="basic label-container" style="" x="-130" y="-75" width="260" height="150"/><g class="label" style="" transform="translate(-100, -60)"><rect/><foreignObject width="200" height="120"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>Ranked-choice: n-1 points for 1st place<br />n-2 for 2nd, etc.<br />Requires rankings not single votes</p></span></div></foreignObject></g></g></g></g><g class="root" transform="translate(335, 585)"><g class="clusters"><g class="cluster" id="Unanimous" data-look="classic"><rect style="fill:#f3e5f5 !important;stroke:#7b1fa2 !important" x="8" y="8" width="330" height="225"/><g class="cluster-label" transform="translate(132, 8)"><foreignObject width="82" height="24"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; tex